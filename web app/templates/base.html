<!DOCTYPE html>
<!-- BASE TEMPLATE -->
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNQ Pre-Workout</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root {
            --bg-color: #fcfaf6;
            --black: #fcfaf6;
            --offwhite: #2c2c28;
            --accent: #8faa8b;
            --accent-light: #dce8da;
            --muted: #8a8a82;
        }

        html,
        body {
            height: 100%;
        }

        /* remove default body margins that can cause offsets */
        body {
            margin: 0;
            background-color: var(--bg-color);
        }

        .logo {
            height: auto;
            font-size: 1.5rem;
            padding: 0.5rem;
        }

        /* Separate class for the image so text `.logo` isn't affected */
        .logo-img {
            height: 40px;
            width: auto;
            display: inline-block;
            vertical-align: middle;
        }

        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 1.25rem 3rem;
            background: rgba(252, 250, 246, 0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);

            justify-content: space-between;
        }

        .nav-txt {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.08em;
            color: #2c2c28;
        }

        .nav-txt :hover {
            opacity: 0.8;
        }

        /* menu */
        .nav-drawer {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 260px;
            background: #fcfaf6;
            border-left: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 200;
            padding: 2rem 1.5rem;
        }

        .nav-drawer.open {
            display: block;
        }

        .drawer-link {
            display: block;
            padding: 0.85rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            text-decoration: none;
            color: var(--offwhite);
            font-size: 0.95rem;
        }

        .drawer-link:hover {
            color: var(--accent);
            text-decoration: none;
        }

        /* Custom submit button that preserves Bootstrap basics */
        .btn.btn-submit {
            background-color: #529963;
            color: #ffffff;
            border-color: #5faa70;
            padding-top: 3px;
            padding-bottom: 3px;
            transition: background-color 150ms ease, border-color 150ms ease;
        }

        .btn.btn-submit:hover,
        .btn.btn-submit:focus {
            background-color: #67b378;
            border-color: #529963;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15);
        }

        .btn.btn-submit:active {
            background-color: #1e7e34;
            border-color: #1c7430;
        }

        /* back button */
        .btn-back {
            color: inherit;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            width: fit-content;
            margin-top: -0.5rem;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            text-shadow: #242422;
            color: #535350;
        }

        .app-container {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 15vh;
        }

        .app-inner {
            max-width: 80vw;
            margin: 0 auto;
            text-align: center;
            transition: transform 200ms ease;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-container {
                min-height: calc(100vh - 3.5rem);
            }

            .app-inner {
                transform: translateY(-5%);
                padding: 0 1rem;
                max-width: 90vw;
                width: 90vw;
            }

            nav {
                padding: 1rem 1.5rem;
            }

            .btn-dark {
                width: 100%;
                text-align: center;
            }

            footer {
                padding: 1.5rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                min-height: calc(100vh - 3rem);
                padding-top: 1rem;
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .app-inner {
                transform: translateY(12%);
                max-width: 95vw;
                width: 95vw;
            }

            .main-nav {
                padding: 0.5rem 1rem;
            }

            .nav-brand {
                font-size: 1.25rem;
            }

            .nav-cta {
                font-size: 0.75rem;
                padding: 0.45rem 0rem;
            }

            .btn-primary {
                width: 100%;
                justify-content: center;
                padding: 0.9rem 1.5rem;
            }

            .logo-img {
                height: 30px;
            }

            footer {
                padding: 1.25rem;
            }
        }
    </style>

    {% block styles %}{% endblock %}

    <title>{% block title%}{% endblock %}</title>
</head>

<body>
    <div class="main-nav">
        <a href="/" style="display:flex; align-items:center; gap:0.6rem; text-decoration:none;">
            <img class="logo-img" src="{{ url_for('static', filename='logo2.png') }}" alt="YNQ Logo">
            <span class="nav-txt">YNQ</span>
        </a>
        <button id="hamburger-btn" style="background:none; border:none; cursor:pointer; font-size:1.4rem;">☰</button>
    </div>

    <div class="nav-drawer" id="nav-drawer">
        <button onclick="document.getElementById('nav-drawer').classList.remove('open')"
            style="background:none; border:none; cursor:pointer; float:right;">✕</button>
        <br>
        <a href="/" class="drawer-link">Home</a>
        <a href="/quiz/name" class="drawer-link">Quiz</a>
        <a href="/customize" class="drawer-link">Customize</a>
        <a href="/liked-products" class="drawer-link">Liked Products</a>
        <a href="/products" class="drawer-link">Products</a>
    </div>

    <div class="app-container">
        <div class="app-inner">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        document.getElementById('hamburger-btn').onclick = () => {
            document.getElementById('nav-drawer').classList.toggle('open');
        };
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
