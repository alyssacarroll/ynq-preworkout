{% extends "quiz_template.html" %}
{% block quiz_content %}

<div class="question">What's your sex?</div>
<form method="POST" action="/quiz/sex">

    <div class="d-grid gap-3 col-12 col-md-6 mx-auto">

        <input type="radio" class="btn-check" name="sex" id="male" value="male" autocomplete="off">
        <label class="btn btn-outline-dark" for="male">Male</label>

        <input type="radio" class="btn-check" name="sex" id="female" value="female" autocomplete="off">
        <label class="btn btn-outline-dark" for="female">Female</label>

        <input type="radio" class="btn-check" name="sex" id="ignore" value="ignore" autocomplete="off">
        <label class="btn btn-outline-dark" for="ignore">Don't consider this</label>

        {% if error %}
        <div class="error-inline">
            <div class="error-dot"></div> {{ error }} </div>
        {% endif %}

        <a class="btn-back" href="/quiz/age"> ← Back </a>
    </div>

    <button type="submit" class="btn btn-primary mt-3 btn-submit">Next→</button>
</form>

<script>
  if (window.innerWidth <= 480) {
    document.querySelectorAll('.btn-check').forEach(radio => {
      radio.addEventListener('change', () => {
        radio.closest('form').submit();
      });
    });
  }
</script>
{% endblock %}
