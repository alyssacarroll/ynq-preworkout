{% extends "quiz_template.html" %}
{% block quiz_content %}

<div class="question">What's your name?</div>
<form method="POST" action="/quiz/name">
    
    <div class="d-grid gap-3 col-12 col-md-6 mx-auto">
        <input class="form-control {% if error %}is-invalid{% endif %}" type="text" name="user" placeholder="Enter your name..."
            aria-label="name input">
        
        {% if error %}
        <div class="error-inline">
            <div class="error-dot"></div> {{ error }} </div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary btn-submit mt-3">Next →</button>
    
</form>

{% endblock %}
