<!DOCTYPE html>
<!-- BASE TEMPLATE -->
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        html,
        body {
            height: 100%;
        }

        /* remove default body margins that can cause offsets */
        body {
            margin: 0;
        }

        .logo {
            height: auto;
            font-size: 2rem;
        }

        .app-container {
            display: flex;
            justify-content: center;
            padding: 1rem;
        }

        .app-inner {
            max-width: 980px;
            margin: 0 auto;
            /* center inner content horizontally */
            text-align: center;
            /* center inner text */
        }

        /* Tighten spacing for ingredient lists in product cards */
        .ingredients {
            line-height: 1.2;
        }

        .ingredients strong {
            display: block;
            margin-bottom: 0.15rem;
        }

        .ingredients > div {
            margin: 0 0 0.1rem 0;
            font-size: 0.95rem;
        }

        .ingredients .ingredients-list {
            display: block;
            margin-top: 0.1rem;
        }

        .slider {
            padding-left: 1rem;
            padding-right: 1rem;
            padding-top: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>

    {% block styles %}{% endblock %}

    <title>{% block title%}{% endblock %}</title>
</head>

<body>

    <h1 class="logo">YNQ Pre-Workout</h1>
    <div class="app-container">
        <div class="app-inner">
            {% block user %}{% endblock %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
