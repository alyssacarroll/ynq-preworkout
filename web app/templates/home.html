<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <style>
        html,
        body {
            height: 100%;
        }

        /* remove default body margins that can cause offsets */
        body {
            margin: 0;
        }

        .logo {
            height: auto;
            font-size: 2.5rem;
        }

        .app-container {
            display: flex;
            justify-content: center;
            padding: 1rem;
        }

        .app-inner {
            max-width: 980px;
            margin: 0 auto;
            /* center inner content horizontally */
            text-align: center;
            /* center inner text */
        }
    </style>

    <title>{% block title%}YNQ Pre-Workout{% endblock %}</title>
</head>



<body>
    <h1 class="logo">YNQ Pre-Workout</h1>
    <div class="app-container">
        <div class="app-inner">
            <h3>Find the pre-workout that works for <u>you</u></h3>
            {% block content %}
            <a href='/quiz'> take quiz </a>
            {% endblock %}
        </div>
    </div>
</body>

</html>
