<!DOCTYPE html>
<!-- BASE TEMPLATE -->
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNQ Pre-Workout</title>
    <link rel="icon" href="../static/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root {
            --bg-color: #fcfaf6;
            --black: #fcfaf6;
            --offwhite: #2c2c28;
            --accent: #8faa8b;
            --accent-light: #dce8da;
            --muted: #8a8a82;
        }

        html,
        body {
            height: 100%;
        }

        /* remove default body margins that can cause offsets */
        body {
            margin: 0;
            background-color: var(--bg-color);
        }

        .logo {
            height: auto;
            font-size: 1.5rem;
            padding: 0.5rem;
        }

        /* Separate class for the image so text `.logo` isn't affected */
        .logo-img {
            height: 40px;
            width: auto;
            display: inline-block;
            vertical-align: middle;
        }

        /* Scale logo for smaller screens */
        @media (max-width: 480px) {
            .logo-img {
                height: 30px;
            }
        }

        .question {
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .app-container {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 10vh;
        }

        .app-inner {
            max-width: 980px;
            margin: 0 auto;
            text-align: center;
            transition: transform 200ms ease;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-container {
                min-height: calc(100vh - 3.5rem);
            }

            .app-inner {
                transform: translateY(-12%);
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                min-height: calc(100vh - 3rem);
                padding-top: 0.5rem;
            }

            /* on very small screens, avoid shifting — let content flow naturally */
            .app-inner {
                transform: translateY(0);
            }
        }

        /* Custom submit button that preserves Bootstrap basics */
        .btn.btn-submit {
            background-color: #529963;
            color: #ffffff;
            border-color: #5faa70;
            padding-top: 3px;
            padding-bottom: 3px;
            transition: background-color 150ms ease, border-color 150ms ease;
        }

        .btn.btn-submit:hover,
        .btn.btn-submit:focus {
            background-color: #67b378;
            border-color: #529963;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15);
        }

        .btn.btn-submit:active {
            background-color: #1e7e34;
            border-color: #1c7430;
        }

        /* Tighten spacing for ingredient lists in product cards */
        .ingredients {
            line-height: 1.2;
        }

        .ingredients strong {
            display: block;
            margin-bottom: 0.15rem;
        }

        .ingredients>div {
            margin: 0 0 0.1rem 0;
            font-size: 0.95rem;
        }

        .ingredients .ingredients-list {
            display: block;
            margin-top: 0.1rem;
        }

        .slider {
            padding-left: 1rem;
            padding-right: 1rem;
            padding-top: 0.5rem;
            margin-bottom: 1rem;
        }

        /* Make slider cards more compact */
        .slider.card {
            padding-top: 0.75rem;
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .slider label {
            margin-bottom: 0.2rem;
            font-weight: 400;
        }

        .slider .mb-0 {
            margin-bottom: 0rem !important;
        }

        .slider input[type="range"] {
            margin-top: 0.2rem;
            margin-bottom: 0.1rem;
        }

        .slider small {
            line-height: 0.25;
        }

        .form-range::-webkit-slider-thumb {
            background-color: #6eb17d !important;
        }

        .form-range::-moz-range-thumb {
            background-color: #539962 !important;
        }

        /* remove bootstrap blue glow */
        .form-range:focus::-webkit-slider-thumb {
            box-shadow: 0 0 0 0.25rem rgba(0, 128, 0, .25);
        }

        .form-range:focus::-moz-range-thumb {
            box-shadow: 0 0 0 0.25rem rgba(0, 128, 0, .25);
        }

        .form-range::-webkit-slider-runnable-track {
            background: linear-gradient(--accent, --accent) 0/0% 100% no-repeat, #dee2e6 !important;
        }

        .form-range::-moz-range-track {
            background: #dee2e6;
        }

        /* back button */
        .btn-back {
            color: inherit;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            width: fit-content;
            margin-top: -0.5rem;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            text-shadow: #242422;
            color: #535350;
            /* text-decoration: underline; */
        }

        /* products */
        .products-hero {
            padding: 7rem 3rem 3rem;
            position: relative;
        }

        .products-hero::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(135deg, rgba(143, 170, 139, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .products-eyebrow {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .products-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 6vw, 5.5rem);
            letter-spacing: 0.03em;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .products-subtitle {
            font-size: 0.95rem;
            color: rgba(44, 44, 40, 0.5);
            font-weight: 300;
            margin-bottom: 0;
        }

        .products-grid {
            padding: 2rem 3rem 6rem;
        }

        /* MATCH BADGE */
        .match-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(143, 170, 139, 0.12);
            border: 1px solid rgba(143, 170, 139, 0.3);
            padding: 0.25rem 0.65rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .match-tag.perfect {
            color: #5a8a55;
            background: rgba(143, 170, 139, 0.2);
            border-color: rgba(143, 170, 139, 0.5);
        }

        .match-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* PRODUCT CARD */
        .product-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.07);
            border-radius: 8px;
            padding: 1.75rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-card .product-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.04em;
            line-height: 1.15;
            margin-bottom: 0.25rem;
            color: #2c2c28;
        }

        .product-card .brand-name {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(44, 44, 40, 0.4);
            margin-bottom: 1.25rem;
        }

        .ingredients-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(44, 44, 40, 0.4);
            margin-bottom: 0.6rem;
        }

        .ingredient-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            font-size: 0.85rem;
            color: #2c2c28;
        }

        .ingredient-row:last-of-type {
            border-bottom: none;
        }

        .ingredient-row span:first-child {
            color: rgba(44, 44, 40, 0.6);
        }

        .ingredient-row span:last-child {
            font-weight: 600;
            font-size: 0.82rem;
        }

        .product-card .spacer {
            flex: 1;
        }

        .view-product-btn {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            padding: 0.7rem 1rem;
            background: var(--accent);
            color: #fcfaf6 !important;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .view-product-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(143, 170, 139, 0.35);
            text-decoration: none;
            color: #fcfaf6 !important;
        }

        /* SECTION DIVIDER */
        .section-divider {
            padding: 0 3rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .section-divider-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            white-space: nowrap;
            color: #2c2c28;
        }

        .section-divider-line {
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.08);
        }

        /* EMPTY STATE */
        .empty-state {
            padding: 4rem 3rem;
            text-align: center;
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            background: rgba(143, 170, 139, 0.12);
            border-radius: 12px;
            display: grid;
            place-items: center;
            margin: 0 auto 1.25rem;
        }

        .empty-icon svg {
            stroke: var(--accent);
            width: 28px;
            height: 28px;
        }

        .empty-state h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: rgba(44, 44, 40, 0.5);
            max-width: 32ch;
            margin: 0 auto;
        }
    </style>

    {% block styles %}{% endblock %}

    <title>{% block title%}{% endblock %}</title>
</head>

<body>
    <nav style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center;
  padding: 1.25rem 3rem; background: rgba(252,250,246,0.88); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,0.07);">
        <a href="/" style="display:flex; align-items:center; gap:0.6rem; text-decoration:none;">
            <img class="logo-img" src="{{ url_for('static', filename='logo2.png') }}" alt="YNQ Logo">
            <span
                style="font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.08em; color:#2c2c28;">YNQ</span>
        </a>
    </nav>

    <div class="app-container">
        <div class="app-inner">
            {% block user %}{% endblock %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
