<!DOCTYPE html>
<!-- BASE TEMPLATE -->
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        :root {
            --bg-color: #fcfaf6;
            /* light neutral background — change this value to customize */
        }

        html,
        body {
            height: 100%;
        }

        /* remove default body margins that can cause offsets */
        body {
            margin: 0;
            background-color: var(--bg-color);
        }

        .logo {
            height: auto;
            font-size: 1.5rem;
            padding: 0.5rem;
        }

        /* Separate class for the image so text `.logo` isn't affected */
        .logo-img {
            height: 48px;
            width: auto;
            display: inline-block;
            vertical-align: middle;
        }

        /* Scale logo for smaller screens */
        @media (max-width: 480px) {
            .logo-img {
                height: 36px;
            }
        }

        .question {
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .app-container {
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 10vh;
        }

        .app-inner {
            max-width: 980px;
            margin: 0 auto;
            text-align: center;
            transition: transform 200ms ease;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .app-container {
                min-height: calc(100vh - 3.5rem);
            }

            .app-inner {
                transform: translateY(-12%);
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                min-height: calc(100vh - 3rem);
                padding-top: 0.5rem;
            }

            /* on very small screens, avoid shifting — let content flow naturally */
            .app-inner {
                transform: translateY(0);
            }
        }

        /* Custom submit button that preserves Bootstrap basics */
        .btn.btn-submit {
            background-color: #529963;
            color: #ffffff;
            border-color: #5faa70;
            padding-top: 3px;
            padding-bottom: 3px;
            transition: background-color 150ms ease, border-color 150ms ease;
        }

        .btn.btn-submit:hover,
        .btn.btn-submit:focus {
            background-color: #67b378;
            border-color: #529963;
            color: #ffffff;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.15);
        }

        .btn.btn-submit:active {
            background-color: #1e7e34;
            border-color: #1c7430;
        }

        /* Tighten spacing for ingredient lists in product cards */
        .ingredients {
            line-height: 1.2;
        }

        .ingredients strong {
            display: block;
            margin-bottom: 0.15rem;
        }

        .ingredients>div {
            margin: 0 0 0.1rem 0;
            font-size: 0.95rem;
        }

        .ingredients .ingredients-list {
            display: block;
            margin-top: 0.1rem;
        }

        .slider {
            padding-left: 1rem;
            padding-right: 1rem;
            padding-top: 0.5rem;
            margin-bottom: 1rem;
        }

        /* Make slider cards more compact */
        .slider.card {
            padding-top: 0.75rem;
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .slider label {
            margin-bottom: 0.2rem;
            font-weight: 400;
        }

        .slider .mb-0 {
            margin-bottom: 0rem !important;
        }

        .slider input[type="range"] {
            margin-top: 0.2rem;
            margin-bottom: 0.1rem;
        }

        .slider small {
            line-height: 0.25;
        }
    </style>

    {% block styles %}{% endblock %}

    <title>{% block title%}{% endblock %}</title>
</head>

<body>
    <div class="logo">
        <img class="logo-img" src="{{ url_for('static', filename='logo.png') }}" alt="YNQ Logo">
        YNQ PRE-WORKOUT
    </div>

    <div class="app-container">
        <div class="app-inner">
            {% block user %}{% endblock %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
