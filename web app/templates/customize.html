{% extends "base.html" %}

{% block content %}
<style>
    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --bg: #f2ede4;
        --card: #ffffff;
        --green: #5a8055;
        --green-dark: #4a7045;
        --green-thumb: #5a8055;
        --border: #e0dbd0;
        --border-card: #d8d3c8;
        --text: #1e1e18;
        --text-2: #6b6660;
        --text-3: #a09a90;
        --track: #ddd8ce;
    }
    
    /* ── LAYOUT ── */
    .customize-wrap {
        max-width: 90vw;
        min-width: 300px;
        margin: 0 auto;
        padding: 0 1.75rem 5rem;
    }

    h1.blend-title {
        font-size: 28px;
        font-weight: 400;
        margin-bottom: 1.75rem;
        color: var(--text);
    }

    .app-inner {
            max-width: 80vw;
            width: 60vw;
            margin: 0 auto;
            text-align: center;
            transition: transform 200ms ease;
        }

    /* ── CARDS ── */
    .ing-card {
        background: var(--card);
        border: 1px solid var(--border-card);
        border-radius: 14px;
        padding: 1.5rem 1.75rem;
        margin-bottom: 14px;
        width: 100%;    
        overflow: visible;
    }

    .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.25rem;
    }

    .card-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
    }

    .reset-all-btn {
        font-size: 11px;
        font-weight: 400;
        color: var(--text-3);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 3px;
        transition: color 0.15s;
    }

    .reset-all-btn:hover {
        color: var(--text-2);
    }

    /* ── INGREDIENT GRID ── */
    .ing-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem 2rem;
    }

    @media (max-width: 680px) {
        .ing-grid {
            grid-template-columns: 1fr 1fr;
        }
    }

    @media (max-width: 440px) {
        .ing-grid {
            grid-template-columns: 1fr;
        }
    }

    /* ── INGREDIENT ITEM ── */
    .ing-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .ing-label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
    }

    /* ── SLIDER ── */
    .slider-row {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    input[type=range] {
        -webkit-appearance: none;
        flex: 1;
        height: 4px;
        border-radius: 4px;
        background: var(--track);
        outline: none;
        cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--green-thumb);
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px var(--green-thumb);
        cursor: pointer;
        transition: transform 0.1s;
    }

    input[type=range]:hover::-webkit-slider-thumb {
        transform: scale(1.15);
    }

    input[type=range]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--green-thumb);
        border: 2px solid #fff;
        cursor: pointer;
    }

    .remove-x {
        background: none;
        border: none;
        color: var(--text-3);
        font-size: 14px;
        cursor: pointer;
        padding: 0 2px;
        line-height: 1;
        transition: color 0.12s;
        flex-shrink: 0;
    }

    .remove-x:hover {
        color: var(--text);
    }

    .dose-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .dose-val {
        font-size: 12px;
        color: var(--text-2);
    }

    .reset-one {
        font-size: 11px;
        color: var(--text-3);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 3px;
        transition: color 0.12s;
        padding: 0;
    }

    .reset-one:hover {
        color: var(--text-2);
    }

    /* inner divider */
    .inner-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.25rem 0;
        display: none;
    }

    .inner-divider.visible {
        display: block;
    }

    .inner-divider-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 1rem;
        display: none;
        text-align: left;
    }

    .inner-divider-label.visible {
        display: block;
    }

    /* add pool */
    .add-pool {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 24px;
    }

    .add-chip {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        font-weight: 400;
        color: var(--text);
        background: none;
        border: 1px solid var(--border-card);
        border-radius: 100px;
        padding: 5px 12px 5px 10px;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.12s, border-color 0.12s;
    }

    .add-chip:hover {
        background: var(--bg);
        border-color: #b8b2a8;
    }

    .add-chip .plus {
        font-size: 14px;
        color: var(--green);
        font-weight: 700;
    }

    .empty-pool {
        font-size: 13px;
        color: var(--text-3);
        font-style: italic;
        display: none;
    }

    .empty-pool.show {
        display: block;
    }

    /* toast */
    .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #2a2820;
        color: #f2ede4;
        font-size: 13px;
        font-weight: 400;
        padding: 11px 18px;
        border-radius: 100px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
        white-space: nowrap;
        z-index: 999;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
    }

    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
    }

    .toast-undo {
        font-weight: 700;
        color: #8fba78;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        padding: 0;
        transition: color 0.12s;
    }

    .toast-undo:hover {
        color: #aed494;
    }

    /* Bottom actions */
    .bottom-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 1.5rem;
    }

    .btn-back {
        font-size: 13px;
        color: var(--text-2);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        transition: color 0.12s;
        text-decoration: none;
    }

    .btn-back:hover {
        color: var(--text);
    }

    /* info icon */
    .info-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 1.5px solid var(--text-3);
        color: var(--text-3);
        font-size: 9px;
        font-weight: 700;
        cursor: default;
        position: relative;
        flex-shrink: 0;
        font-style: normal;
    }

    .info-icon::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 7px);
        left: 50%;
        transform: translateX(-50%);
        background: #2a2820;
        color: #f2ede4;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.45;
        padding: 8px 11px;
        border-radius: 8px;
        width: 220px;
        white-space: normal;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
        z-index: 100;
    }

    .info-icon:hover::after {
        opacity: 1;
    }
</style>

<form method="POST" action="/customize" id="customize-form">
    <div class="customize-wrap">
        <h1 class="blend-title">Customize your blend:</h1>

        <!-- RECOMMENDED CARD -->
        <div class="ing-card">
            <div class="card-header">
                <span class="card-title">Recommended</span>
                <button type="button" class="reset-all-btn" onclick="resetAll()">reset all ↺</button>
            </div>
            <div class="ing-grid" id="rec-grid"></div>
            <hr class="inner-divider" id="inner-div">
            <div class="inner-divider-label" id="inner-label">Added by you</div>
            <div class="ing-grid" id="added-grid"></div>
        </div>

        <!-- ADD INGREDIENTS CARD -->
        <div class="ing-card">
            <div class="card-header">
                <span class="card-title">Add Ingredients</span>
            </div>
            <div class="add-pool" id="pool"></div>
            <div class="empty-pool" id="pool-empty">All available ingredients have been added.</div>
        </div>

        <!-- BOTTOM BUTTONS -->
        <div style="max-width: 90vw; min-width: 300px; margin: 1.5rem auto 0; padding: 0 1.75rem; display: flex; align-items: center; gap: 12px;">
            <a class="btn-back" href="/quiz/stimulant">← Back</a>
        </div>
        <button type="submit" class="btn btn-primary mt-3 btn-submit">Get your results!</button>
    
    </div>
</form>

<!-- TOAST (undo remove)-->
<div class="toast" id="toast">
    <span id="toast-msg"></span>
    <button type="button" class="toast-undo" onclick="undoRemove()">Undo</button>
</div>

<script>
    const ING_RECS = {{ recommended | tojson }};

    /* ── STATIC DATA ── */
    const UNITS = {
        caffeine: 'mg', beta: 'g', creatine: 'g', betaine: 'g',
        taurine: 'mg', citrulline: 'g', theanine: 'mg', tyrosine: 'mg', agmatine: 'mg',
    };
    const STEPS = {
        caffeine: 25, beta: 0.1, creatine: 0.5, betaine: 0.1,
        taurine: 100, citrulline: 0.5, theanine: 10, tyrosine: 50, agmatine: 50,
    };
    const MINS = {
        caffeine: 0, beta: 0, creatine: 0, betaine: 0,
        taurine: 0, citrulline: 0, theanine: 0, tyrosine: 0, agmatine: 0,
    };
    const MAXS = {
        caffeine: 500, beta: 6.4, creatine: 15, betaine: 5,
        taurine: 3000, citrulline: 11, theanine: 500, tyrosine: 4000, agmatine: 1500,
    };
    const NAMES = {
        caffeine: 'Caffeine', beta: 'Beta-Alanine', creatine: 'Creatine',
        betaine: 'Betaine', taurine: 'Taurine', citrulline: 'L-Citrulline',
        theanine: 'L-Theanine', tyrosine: 'L-Tyrosine', agmatine: 'Agmatine Sulfate',
    };

    const INFO = {
        caffeine: 'A natural stimulant that increases speed, power output, and endurance while reducing perceived effort.',
        beta: 'A non-essential amino acid that can help improve muscular endurance and reduce fatigue. Can give you the tingling sensation that feels like bugs under your skin.',
        creatine: 'A compound that helps rapidly regenerate ATP, allowing you to lift heavier, do more reps, and recover faster between sets. Consistent use also supports greater strength and muscle gains over time.',
        betaine: 'A compound that supports cellular hydration and may enhance power output and muscle endurance under stress. It helps with performance in high-volume or metabolically demanding workouts and may aid body composition by supporting lean mass and reducing fat.',
        taurine: 'An amino acid that supports muscle contraction, cell hydration, and calcium handling in muscle fibers. It can reduce fatigue, improve anaerobic power, and provide antioxidant protection during intense training.',
        citrulline: 'An amino acid that raises nitric oxide levels for better blood flow, oxygen delivery, and nutrient uptake to muscles. It improves endurance and increases the number of reps you can perform.',
        theanine: 'An amino acid found in green tea that promotes relaxed focus and smooths out caffeine\'s effects. When combined with caffeine, it reduces jitteriness while improving attention, alertness, and mental performance.',
        tyrosine: 'An amino acid that supports cognitive function under stress. It helps maintain focus, motivation, and mental sharpness.',
        agmatine: 'Enhances pumps by boosting nitric oxide production, improves focus/mood, and may aid pain tolerance and endurance.',
    }

    /* ── STATE ── */
    const RECOMMENDED = Object.keys(ING_RECS); // just IDs for ING_RECS
    const POOL_IDS = {{ pool | tojson }};
    const ALL_IDS = [...RECOMMENDED, ...POOL_IDS];

    const state = {};
    ALL_IDS.forEach(id => {
        const rec = ING_RECS[id] !== undefined ? ING_RECS[id] : (0 || MINS[id]);
        state[id] = {
            val: rec,
            rec: rec,
            inRec: RECOMMENDED.includes(id),
            isOrig: RECOMMENDED.includes(id),
        };
    });

    /* ── HELPERS ── */
    // Format display value with units, rounding based on step size
    function fmt(id) {
        const v = state[id].val;
        const step = STEPS[id];
        const disp = step >= 10 ? Math.round(v) : step >= 1 ? Math.round(v) : parseFloat(v.toFixed(1));
        return `${disp} ${UNITS[id]}`;
    }

    /* ── RENDER ── */
    // Builds and returns the HTML string for a single ingredient slider component
    function ingItemHTML(id) {
        const s = state[id];
        const min = MINS[id], max = MAXS[id], step = STEPS[id];
        const pct = Math.max(0, Math.min(100, ((s.val - min) / (max - min)) * 100));
        return `
            <div class="ing-item" id="item-${id}">
                <div class="ing-label">
                    <span>${NAMES[id]}</span>
                    <span class="info-icon" data-tip="${INFO[id]}">?</span> 
                </div>
                <div class="slider-row">
                <input type="range" min="${min}" max="${max}" step="${step}" value="${s.val}" id="custom_${id}" name="custom_${id}"
                    style="background: linear-gradient(to right, var(--green-thumb) ${pct}%, var(--track) ${pct}%)"
                    oninput="slide('${id}', this)">
                <button type="button" class="remove-x" title="Remove" onclick="removeIng('${id}')">✕</button>
                </div>
                <div class="dose-row">
                <span class="dose-val" id="dv-${id}">${fmt(id)}</span>
                <button type="button" class="reset-one" onclick="resetOne('${id}')">reset ↺</button>
                </div>
            </div>`;
    }

    
    function chipHTML(id) {
        return `
            <button type="button" class="add-chip" id="chip-${id}" onclick="addIng('${id}')">
                <span class="plus">+</span>
                ${NAMES[id]}
                <span class="info-icon" data-tip="${INFO[id]}">?</span> 
            </button>`;
    }

    function render() {
        const origIn = RECOMMENDED.filter(id => state[id].inRec);
        const addedIn = POOL_IDS.filter(id => state[id].inRec);
        const poolOut = ALL_IDS.filter(id => !state[id].inRec);

        document.getElementById('rec-grid').innerHTML = origIn.map(ingItemHTML).join('');
        document.getElementById('added-grid').innerHTML = addedIn.map(ingItemHTML).join('');

        const divEl = document.getElementById('inner-div');
        const labelEl = document.getElementById('inner-label');
        divEl.classList.toggle('visible', addedIn.length > 0);
        labelEl.classList.toggle('visible', addedIn.length > 0);

        const pool = document.getElementById('pool');
        const empty = document.getElementById('pool-empty');
        pool.innerHTML = poolOut.map(chipHTML).join('');
        empty.classList.toggle('show', poolOut.length === 0);
    }

    /* ── INTERACTIONS ── */
    function slide(id, el) {
        state[id].val = parseFloat(el.value);
        const pct = Math.max(0, Math.min(100, ((state[id].val - MINS[id]) / (MAXS[id] - MINS[id])) * 100));
        el.style.background = `linear-gradient(to right, var(--green-thumb) ${pct}%, var(--track) ${pct}%)`;
        document.getElementById(`dv-${id}`).textContent = fmt(id);
    }

    function resetOne(id) {
        state[id].val = state[id].rec;
        render();
    }

    function resetAll() {
        RECOMMENDED.forEach(id => { 
            state[id].val = state[id].rec; 
            state[id].inRec = true; 
        });
        POOL_IDS.forEach(id => { 
            state[id].val = state[id].rec; 
            state[id].inRec = false; 
        });
        render();
    }

    /* ── TOAST ── */
    let toastTimer = null;
    let lastRemoved = null;

    function showToast(id) {
        lastRemoved = id;
        document.getElementById('toast-msg').textContent = `"${NAMES[id]}" removed`;
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
            lastRemoved = null;
        }, 3000);
    }

    function undoRemove() {
        if (!lastRemoved) return;
        state[lastRemoved].inRec = true;
        render();
        document.getElementById('toast').classList.remove('show');
        clearTimeout(toastTimer);
        lastRemoved = null;
    }

    function removeIng(id) {
        state[id].inRec = false;
        render();
        showToast(id);
    }

    function addIng(id) {
        state[id].inRec = true;
        render();
    }

    render();
</script>
{% endblock %}
