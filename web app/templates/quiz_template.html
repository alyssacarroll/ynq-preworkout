{% extends "base.html" %}

{% block styles %}
{{ super() }}
  <style>
    .btn {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 3px 7px rgba(0,0,0,0.1);
    }
    .btn-check:checked + .btn {
      background-color: #4b4b4b;
      color: white;
      border-color: #111;
    }
  </style>
{% endblock %}

{% block title %}pre-workout quiz{% endblock %}

{% block user %}
    {% if usr != "" and usr != None %}
        <p>Hi, {{ usr }}!</p>
    {% endif %}
{% endblock %}

{% block content %}
    <h2>Welcome to the quiz!</h2>
    <a href="/quiz/name"> Begin the quiz!</a>
{% endblock %}
